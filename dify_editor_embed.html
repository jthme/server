<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIDGE 编辑器 — Dify集成</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #1a1a2e;
            color: white;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .header h1 { font-size: 18px; }
        .header .info { font-size: 13px; opacity: 0.8; }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .btn-submit {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #218838; }
        .btn-submit:disabled { background: #6c757d; cursor: not-allowed; }
        .status-bar {
            background: #fff;
            padding: 8px 24px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            flex-shrink: 0;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #999;
        }
        .status-dot.ready { background: #28a745; }
        .status-dot.loading { background: #ffc107; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .iframe-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #007bff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-overlay p { margin-top: 12px; color: #666; }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: #28a745; }
        .toast.error { background: #dc3545; }
    </style>
</head>
<body>
    <div class="header">
        <h1>AIDGE 智能消除编辑器</h1>
        <div class="header-actions">
            <span class="info" id="headerInfo">加载中...</span>
            <button class="btn-submit" id="btnSubmit">确认并提交</button>
        </div>
    </div>
    <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">初始化中</span>
    </div>
    <div class="iframe-container">
        <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <p>正在加载编辑器...</p>
        </div>
        <iframe id="editorIframe" class="aidc-open-frame" src="" frameborder="0"></iframe>
    </div>

    <div class="toast" id="toast"></div>

    <!-- ========== 配置参数（在SDK加载前声明） ========== -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);

        const CONFIG = {
            // Dify工作流参数
            sessionId: urlParams.get('session_id') || '',
            workflowRunId: urlParams.get('workflow_run_id') || '',
            formToken: urlParams.get('form_token') || '',

            // Dify API配置
            difyApiBase: urlParams.get('dify_api_base') || 'https://dify.swworker.com',
            humanInputVar: urlParams.get('human_input_var') || 'image_url',

            // 后端服务地址
            backendBase: urlParams.get('backend_base') || 'http://localhost:8081',

            // 编辑器配置
            editorBaseUrl: 'https://image-editor.aidc-ai.com/editor/index.html/?version=v2#/',
            editorTool: 'elimination',
            apiHost: 'aibcn',
            trial: urlParams.get('trial') !== 'false',
            lang: urlParams.get('lang') || 'zh-cn',

            // 能力输入参数（消除编辑器）
            imageUrl: urlParams.get('image_url') || '',

            // 加签服务地址
            signatureEndpoint: urlParams.get('signature_endpoint') || 'http://localhost:8081/open/api/signature',

            // 高级功能
            charge: false,
            reEdit: true
        };

        // SDK配置 — 必须在SDK脚本加载前正确设置
        window.INTL_OP_FRAME_SDK_CONFIG = {
            apiMap: {
                '/open/api/signature': CONFIG.signatureEndpoint
            },
            dataType: 'json'
        };
    </script>
    <!-- ========== AIDGE 通信SDK ========== -->
    <script src="https://g.alicdn.com/code/npm/@ali/intl-op-frame-sdk/0.1.10/main.min.js"></script>

    <script>
        // 结果存储
        let editorResults = [];
        let isEditorReady = false;

        // ============================================================
        //                      工具函数
        // ============================================================
        function setStatus(text, state) {
            document.getElementById('statusText').textContent = text;
            const dot = document.getElementById('statusDot');
            dot.className = 'status-dot' + (state ? ` ${state}` : '');
        }

        function showToast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast show ' + (type || '');
            setTimeout(() => { el.className = 'toast'; }, 3000);
        }

        // ============================================================
        //                      构建编辑器URL
        // ============================================================
        function buildEditorUrl() {
            const payload = {
                apiHost: CONFIG.apiHost,
                trial: CONFIG.trial,
                lang: CONFIG.lang,
                imageUrl: CONFIG.imageUrl,
                charge: CONFIG.charge,
                reEdit: CONFIG.reEdit
            };
            const payloadString = encodeURIComponent(JSON.stringify(payload));
            return `${CONFIG.editorBaseUrl}${CONFIG.editorTool}?payload=${payloadString}`;
        }

        // ============================================================
        //                      初始化编辑器
        // ============================================================
        function initEditor() {
            const iframe = document.getElementById('editorIframe');
            const editorUrl = buildEditorUrl();
            iframe.src = editorUrl;

            document.getElementById('headerInfo').textContent =
                `Session: ${CONFIG.sessionId.substring(0, 8)}...`;

            setStatus('加载编辑器', 'loading');
        }

        // ============================================================
        //                      "确认并提交"按钮点击
        // ============================================================
        document.getElementById('btnSubmit').addEventListener('click', async function() {
            const btn = this;

            // 使用缓存的编辑结果（由 taskSuccess 事件自动缓存）
            if (!editorResults || editorResults.length === 0) {
                showToast('未获取到编辑结果：请先在编辑器内点击"立即生成"', 'error');
                return;
            }

            const currentResult = editorResults.find(r => r.isCurrentIndex) || editorResults[0];
            const finalImageUrl = currentResult.url;

            if (!finalImageUrl) {
                showToast('编辑结果中没有图片URL', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '提交中...';
            setStatus('正在恢复工作流...', 'loading');

            try {
                const resumeUrl = `${CONFIG.backendBase}/open/api/resume_workflow`;
                const res = await fetch(resumeUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        workflow_run_id: CONFIG.workflowRunId,
                        form_token: CONFIG.formToken,
                        final_image_url: finalImageUrl,
                        human_input_var: CONFIG.humanInputVar,
                        session_id: CONFIG.sessionId
                    })
                });

                const data = await res.json();

                if (res.ok && data.dify_resume_ok) {
                    showToast('已恢复Dify工作流执行', 'success');
                    setStatus('工作流已恢复', 'ready');
                    showSuccessPage({
                        tool: currentResult.tool || 'elimination',
                        final_image_url: finalImageUrl,
                        original_image_url: currentResult.originalUrl || ''
                    });
                } else {
                    showToast(`提交失败: ${data.message || '未知错误'}`, 'error');
                    setStatus('提交失败', '');
                    btn.disabled = false;
                    btn.textContent = '确认并提交';
                }
            } catch (error) {
                console.error('提交失败:', error);
                showToast('网络请求失败: ' + error.message, 'error');
                setStatus('提交失败', '');
                btn.disabled = false;
                btn.textContent = '确认并提交';
            }
        });

        // ============================================================
        //                      监听编辑器消息
        // ============================================================
        window.addEventListener("message", function (ev) {
            const { data, action, biz, errMessage, code } = ev.data;
            console.log('[Editor Message]', ev.data);

            switch (action) {
                case 'pageReady':
                    console.log('编辑器页面初始化完成');
                    setStatus('编辑器就绪', 'ready');
                    isEditorReady = true;
                    document.getElementById('loadingOverlay').style.display = 'none';
                    showToast('编辑器加载完成，编辑后点击"确认并提交"', 'success');
                    break;

                case 'generate':
                    console.log('用户触发生成，图片数量:', data?.imageNum);
                    iframe.contentWindow.postMessage({
                        biz: biz || 'nhci-elimination',
                        action: 'respond',
                        success: true
                    }, '*');
                    break;

                case 'taskSuccess':
                    // 生成任务完成 — 自动缓存结果URL
                    console.log('生成任务完成:', JSON.stringify(data));

                    // 从 taskSuccess 的 data 中提取图片URL并缓存
                    // data 结构可能包含 url / imageUrl 等字段
                    const imageUrl = data?.url || data?.imageUrl || data?.resultUrl || '';
                    if (imageUrl) {
                        editorResults = [{
                            id: data?.id || 'task_' + Date.now(),
                            url: imageUrl,
                            originalUrl: CONFIG.imageUrl,
                            isCurrentIndex: true,
                            tool: CONFIG.editorTool || 'elimination',
                            schema: data?.schema || '',
                            timestamp: Date.now()
                        }];
                        showToast('图片已生成，结果已缓存', 'success');
                    } else {
                        console.warn('taskSuccess 数据中未找到图片URL字段:', data);
                        showToast('图片生成完成，但未获取到图片URL', 'error');
                    }
                    break;

                case 'submitAll':
                    // 编辑器内部"下载/保存"返回的完整结果
                    console.log('编辑器返回完整结果:', JSON.stringify(data));
                    editorResults = data;
                    showToast('结果已缓存，请点击右上角"确认并提交"', 'success');
                    break;

                case 'error':
                    console.error('编辑器错误:', code, errMessage);
                    showToast('编辑器出错: ' + (errMessage || code), 'error');
                    break;

                default:
                    console.log('未处理的消息类型:', action);
            }
        });

        // ============================================================
        //                      显示成功页面
        // ============================================================
        function showSuccessPage(payload) {
            document.body.innerHTML = `
                <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#667eea,#764ba2);">
                    <div style="background:white;padding:48px;border-radius:16px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-width:600px;">
                        <div style="font-size:56px;margin-bottom:16px;">✅</div>
                        <h2 style="margin-bottom:8px;color:#333;">编辑完成</h2>
                        <p style="color:#666;margin-bottom:20px;">工具: ${payload.tool}</p>
                        <div style="background:#f8f9fa;padding:16px;border-radius:8px;margin-bottom:12px;text-align:left;">
                            <p style="font-size:12px;color:#666;">结果图片URL:</p>
                            <p style="font-size:11px;color:#007bff;word-break:break-all;">${payload.final_image_url}</p>
                        </div>
                        <p style="color:#28a745;font-size:16px;margin-top:16px;font-weight:bold;">
                            ✅ Dify工作流已自动恢复执行，请返回查看结果
                        </p>
                    </div>
                </div>`;
        }

        // ============================================================
        //                      启动
        // ============================================================
        if (CONFIG.imageUrl) {
            initEditor();
        } else {
            document.getElementById('loadingOverlay').innerHTML = `
                <div style="text-align:center;color:#666;">
                    <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
                    <p>缺少图片URL参数 (image_url)</p>
                    <p style="font-size:12px;margin-top:8px;">请检查URL参数是否正确</p>
                </div>`;
            setStatus('参数缺失', '');
        }
    </script>
</body>
</html>
